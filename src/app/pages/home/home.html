<main class="home-page">

  <div class="home-page-container">
    <div class="home-description">
      <h2 class="home-header">{{ languageService.t('home.header') }}</h2>
      <h3 class="name">{{ languageService.t('home.name') }}</h3>
      <div class="description">{{ languageService.t('home.description-line1') }}</div>
      <div class="description">{{ languageService.t('home.description-line2') }}</div>
      <div class="button-container">
        <button class="active-btn" [routerLink]="languageService.getLocalizedRoute('appointment')">{{ languageService.t('home.book-appointment') }}</button>
        <button>{{ languageService.t('home.more-info') }}</button>
      </div>
    </div>
    <div class="home-image">
      <img src="/images/fakedoctor.png" alt="{{ languageService.t('home.profileImageAlt') }}" class="home-logo" />
    </div>
  </div>
</main>
