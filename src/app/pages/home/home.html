<main class="home-page">
  <div class="home-page-container">
    <div class="home-description">
      <h1 class="home-header">{{ languageService.t('home.header') }}</h1>
      <h2 class="name">{{ languageService.t('home.name') }}</h2>
      <div class="description">{{ languageService.t('home.description-line1') }}</div>
      <div class="description">{{ languageService.t('home.description-line2') }}</div>
      <div class="button-container">
        <button class="active-btn" [routerLink]="languageService.getLocalizedRoute('appointment')">
          {{ languageService.t('home.book-appointment') }}
        </button>
        <button>{{ languageService.t('home.more-info') }}</button>
      </div>
    </div>
    <figure class="home-image-container">
      <img
        src="/images/Dr.Olivia.jpg"
        alt="{{ languageService.t('home.profileImageAlt') }}"
        class="home-image"
      />
      <figcaption class="image-caption">© Bernal Revert</figcaption>
    </figure>
  </div>
</main>
