<div class="appointment-page">
  <section class="contact-blocks">
    <contact-block
      [label]="languageService.t('pages.contact.clinic1.label')"
      [scheduleEntries]="[
        {
          day: languageService.t('pages.contact.clinic1.schedule.day1.day'),
          hours: languageService.t('pages.contact.clinic1.schedule.day1.hours'),
        },
        {
          day: languageService.t('pages.contact.clinic1.schedule.day2.day'),
          hours: languageService.t('pages.contact.clinic1.schedule.day2.hours'),
        },
      ]"
      [address]="languageService.t('pages.contact.clinic1.address')"
      [phone]="languageService.t('pages.contact.clinic1.phone')"
      [email]="languageService.t('pages.contact.clinic1.email')"
      [notes]="languageService.t('pages.contact.clinic1.notes')"
      [ctaLabel]="languageService.t('appointment.title')"
      [ctaUrl]="'https://www.doctoranytime.be/d/dermatologue/olivia-mathot?crm-widget=book-appointment'"
      [images]="clinic1Images"
      [rotationStartDelayMs]="clinic1RotationDelayMs"
    ></contact-block>

    <contact-block
      [label]="languageService.t('pages.contact.clinic2.label')"
      [scheduleEntries]="[
        {
          day: languageService.t('pages.contact.clinic2.schedule.day1.day'),
          hours: languageService.t('pages.contact.clinic2.schedule.day1.hours'),
        },
        {
          day: languageService.t('pages.contact.clinic2.schedule.day2.day'),
          hours: languageService.t('pages.contact.clinic2.schedule.day2.hours'),
        },
      ]"
      [address]="languageService.t('pages.contact.clinic2.address')"
      [phone]="languageService.t('pages.contact.clinic2.phone')"
      [email]="languageService.t('pages.contact.clinic2.email')"
      [notes]="languageService.t('pages.contact.clinic2.notes')"
      [ctaLabel]="languageService.t('appointment.title')"
      [ctaUrl]="'https://www.dr-institute.com/contactus.php'"
      [images]="clinic2Images"
      [rotationStartDelayMs]="clinic2RotationDelayMs"
    ></contact-block>
  </section>
</div>
