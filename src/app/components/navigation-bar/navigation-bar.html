<nav class="navigation-bar" [attr.aria-label]="languageService.t('nav.mainAria')">
  <ul class="navigation-list">
    @for (btn of navButtons; track btn.id) {
      <li class="navigation-item">
        <navigation-button
          [label]="btn.label"
          [routerLink]="btn.routerLink"
          [icon]="btn.icon"
          [isDarkRed]="btn.isDarkRed"
          >
        </navigation-button>
      </li>
    }
  </ul>
</nav>
