<div class="navigation-bar-mobile">
  <button 
    type="button" 
    class="close-btn" 
    (click)="navButtonClick.emit()"
    aria-label="Sluiten"
    [attr.title]="'Sluiten'"
  >
    ×
  </button>
  @for (btn of navButtons; track btn.id) {
    <navigation-button
      [label]="btn.label"
      [routerLink]="btn.routerLink"
      [icon]="btn.icon"
      (select)="selectButton()">
    </navigation-button>
  }
</div>
