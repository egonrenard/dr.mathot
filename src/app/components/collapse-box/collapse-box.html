<section class="collapse-box" [class.open]="isOpen" [class.keyboard-focus]="isKeyboardFocused">
  <div class="collapse-header" (click)="toggle()" (keydown.enter)="toggle()" (mousedown)="onMouseDown()" (focus)="onFocus()" (blur)="onBlur()" role="button" [attr.aria-expanded]="isOpen" tabindex="0">
    <h2>{{ title }}</h2>
    <img src="/icons/collapse-arrow.svg" id="collapse-arrow" [class.open]="isOpen" alt="Toggle collapse" />
  </div>
  <div class="collapse-content-wrapper" [class.open]="isOpen" [attr.aria-hidden]="!isOpen">
    <div class="collapse-content">
      <ng-content></ng-content>
    </div>
  </div>
</section>
