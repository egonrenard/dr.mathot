<div class="container">
  <div class="image-container">
    @for (img of images; track img; let i = $index) {
      <img
        [src]="img"
        class="fade-image"
        [class.active-image]="isActiveImage(i)"
        [class.leaving-image]="isLeavingImage(i)"
        [class.entering-image]="isEnteringImage(i)"
        [class.image-loaded]="isImageLoaded(img)"
        [alt]="label"
        [attr.loading]="i === 0 ? 'eager' : 'lazy'"
        [attr.fetchpriority]="i === 0 ? 'high' : 'auto'"
        decoding="async"
        (load)="onImageLoad(img)"
      />
    }
  </div>
  <div class="content-container">
    <h2>{{ label }}</h2>
    <div class="schedule-list">
      @for (entry of scheduleEntries; track $index) {
        <p class="schedule-item">
          <img class="info-icon" src="/icons/calendar.svg" alt="" aria-hidden="true" />
          <span
            ><strong>{{ entry.day }}</strong
            >: {{ entry.hours }}</span
          >
        </p>
      }
    </div>
    <p class="info-row">
      <img class="info-icon" src="/icons/location.svg" alt="" aria-hidden="true" />
      <span>{{ address }}</span>
    </p>
    <a class="info-row big" href="tel:{{ phone }}">
      <img class="info-icon" src="/icons/phone.svg" alt="" aria-hidden="true" />
      <span>{{ phone }}</span>
    </a>
    <a class="info-row big" href="mailto:{{ email }}">
      <img class="info-icon" src="/icons/email.svg" alt="" aria-hidden="true" />
      <span>{{ email }}</span>
    </a>
    <p class="notes">{{ notes }}</p>
    <button class="button active-btn" type="button" (click)="onCtaClick()">{{ ctaLabel }}</button>
  </div>
</div>
